<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="100%" height="100%">
  <defs>
    <!-- Leaf Gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B5E20" />
      <stop offset="50%" stop-color="#2E7D32" />
      <stop offset="100%" stop-color="#4CAF50" />
    </linearGradient>

    <!-- Tech Arrow Gradient -->
    <linearGradient id="techGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0277BD" />
      <stop offset="50%" stop-color="#0091EA" />
      <stop offset="100%" stop-color="#00B0FF" />
    </linearGradient>

    <!-- Text Blue Gradient -->
    <linearGradient id="textBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A3C60" />
      <stop offset="100%" stop-color="#0E5A8A" />
    </linearGradient>
  </defs>

  <!-- Graphic Badge Container (Left Aligned) -->
  <g transform="translate(20, 10)">
    <!-- Outer Glow Circle -->
    <circle cx="90" cy="90" r="82" fill="none" stroke="url(#techGrad)" stroke-width="3" opacity="0.4" stroke-dasharray="8 4" />
    <circle cx="90" cy="90" r="76" fill="none" stroke="url(#leafGrad)" stroke-width="2.5" opacity="0.6" />

    <!-- Tech Circuit Streams & Arrow Base -->
    <path d="M 45 130 C 55 100, 80 85, 110 50 L 125 35 L 122 55 L 138 40 L 125 68 L 110 55 C 85 85, 68 105, 55 135 Z" fill="url(#techGrad)" />
    
    <!-- Circuit Dots & Lines -->
    <circle cx="70" cy="115" r="4" fill="#00B0FF" />
    <line x1="70" y1="115" x2="85" y2="100" stroke="#00B0FF" stroke-width="2" />
    <circle cx="85" cy="100" r="3" fill="#00B0FF" />

    <circle cx="85" cy="85" r="4" fill="#00E5FF" />
    <line x1="85" y1="85" x2="100" y2="70" stroke="#00E5FF" stroke-width="2" />
    <circle cx="100" cy="70" r="3" fill="#00E5FF" />

    <circle cx="60" cy="95" r="3.5" fill="#0288D1" />
    <line x1="60" y1="95" x2="75" y2="80" stroke="#0288D1" stroke-width="1.8" />

    <!-- Spark Star at Top Right -->
    <g transform="translate(138, 25)">
      <path d="M 0 -12 L 3 -3 L 12 0 L 3 3 L 0 12 L -3 3 L -12 0 L -3 -3 Z" fill="#00B0FF" />
      <circle cx="0" cy="0" r="2.5" fill="#FFFFFF" />
    </g>

    <!-- Vibrant Sprout Leaves Wrapping from Bottom-Left -->
    <path d="M 35 145 C 20 120, 25 80, 55 65 C 58 78, 52 95, 42 110 C 58 95, 75 90, 95 95 C 78 110, 62 130, 48 152 C 40 150, 36 148, 35 145 Z" fill="url(#leafGrad)" />
    <!-- Lower Leaf Accent -->
    <path d="M 45 140 C 60 148, 90 150, 115 130 C 95 142, 70 145, 45 140 Z" fill="#2E7D32" />
    <!-- Leaf Center Vein -->
    <path d="M 38 140 Q 55 105 85 96" fill="none" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Typography (Right of Graphic) -->
  <text x="210" y="105" font-family="'Outfit', 'Montserrat', 'Inter', sans-serif" font-weight="800" font-size="44" fill="url(#textBlue)" letter-spacing="1.5">SASYA SARTHI</text>
  <text x="212" y="138" font-family="'Inter', 'Roboto', sans-serif" font-weight="700" font-size="12.5" fill="#2C4A6F" letter-spacing="1.8">TECH SOLUTIONS AND ALLIED SERVICES PRIVATE LIMITED</text>

  <!-- Indian Touch Tagline Badge -->
  <rect x="212" y="152" width="220" height="22" rx="11" fill="#E8F5E9" stroke="#C8E6C9" stroke-width="1" />
  <text x="222" y="167" font-family="'Inter', sans-serif" font-weight="600" font-size="10" fill="#1B5E20" letter-spacing="0.5">🌾 Krishi Digital Sarthi | AI &amp; Risk Solutions</text>
</svg>
